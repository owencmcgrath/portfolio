<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../../writings.css">
	<link rel="icon" href="favicon4.ico" type="image/x-icon">
	<title>media of the month, jan. 2026</title>
</head>

<body>
	<div class="title">
		media of the month, jan. 2026
	</div>
	<div class="subtitle">
		what i watched, read, listened to, and enjoyed in january of 2026
	</div>
	
	<script>
		document.addEventListener("DOMContentLoaded", function () {
			const observer = new IntersectionObserver((entries) => {
				entries.forEach(entry => {
					if (entry.isIntersecting) {
						entry.target.classList.add('is-visible');
					}
				});
			}, {
				threshold: 0.1
			});
			const elements = document.querySelectorAll('.media-content');
			elements.forEach(el => observer.observe(el));
		});
	</script>
</body>

</html>
